name: foi
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.1


  

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter



  # --- Core Framework & Architecture ---
  cupertino_icons: ^1.0.8                  # iOS style icons
  get: ^4.7.3                              # State management, navigation, and dependency injection
  dartz: ^0.10.1                           # Functional programming (Either, Option, etc.)

  # --- Networking & API ---
  dio: ^5.9.2                         # Advanced HTTP client (interceptors, formData)
  internet_connection_checker_plus: ^2.9.1+2 # Connectivity monitoring

  # --- Local Storage & Persistence ---
  get_storage: ^2.1.1                      # Simple and fast key-value storage
  path_provider: ^2.1.5                    # Access to device filesystem paths

  # --- Google Cloud & Firebase ---
  # firebase_core: ^4.4.0                   # Initialize Firebase services
  # firebase_messaging: ^16.1.1             # Cloud messaging for push notifications
  # firebase_analytics: ^12.1.2             # Google Analytics for Firebase
  # firebase_crashlytics: ^5.0.7            # Error tracking and crash reporting
  google_sign_in: ^7.2.0                   # Google authentication
  google_maps_flutter: ^2.15.0             # Interactive maps
  geocoding: ^4.0.0                        # Coordinate-to-address conversion
  geolocator: ^14.0.2                       # Get device location

  # --- Auth & Security ---
  sign_in_with_apple: ^7.0.1               # Apple authentication
  jwt_decode: ^0.3.1                       # Decode JSON Web Tokens
  permission_handler: ^12.0.1              # Manage system permissions

  # --- UI & Design System ---
  flutter_screenutil: ^5.9.3               # Responsive UI scaling
  flutter_svg: ^2.2.4                     # SVG image support
  cached_network_image: ^3.4.1             # Image loading with caching
  lottie: ^3.3.2                           # Adobe After Effects animations
  skeletonizer: ^2.1.3                     # Skeleton loading layouts
  carousel_slider: ^5.1.2                  # Image/content sliders
  pin_code_fields: ^9.1.0                  # OTP/PIN input fields

  # --- Utilities & Helpers ---
  share_plus: ^12.0.1                       # Core share functionality
  intl: ^0.20.2                          # Internationalization and date formatting
  # uuid: ^4.5.1                             # Unique ID generation
  json_annotation: ^4.11.0                  # JSON serialization annotations
  freezed_annotation: ^3.1.0               # Code generation annotations

  # # --- File Handling & PDF ---
  # file_picker: ^10.3.10                     # Select files from device (Upgraded for Flutter 3.38 compatibility)
  # file_saver: ^0.3.1                       # Save files to device storage
  # excel: ^4.0.3                            # Read and write Excel files
  # pdf: ^3.11.3                             # PDF creation/rendering
  # printing: ^5.14.2                        # Native printing and PDF generator
  # syncfusion_flutter_pdf: ^32.2.3          # Advanced Syncfusion PDF manipulation
  # htmltopdfwidgets: ^2.0.1                 # Convert HTML to PDF widgets
  # open_filex: ^4.4.0                       # Open files in external apps

  # --- Multimedia (Audio/Video/Photo) ---
  image_picker: ^1.2.1                     # Pick images from gallery or camera
  # video_player: ^2.9.5                     # Play video files
  # just_audio: ^0.10.5                      # High-quality audio playback


  # --- App Lifecycle & Notifications ---
  # flutter_local_notifications: ^20.0.0      # Local (on-device) notifications
  app_links: ^7.0.0                        # Deep linking support
  url_launcher: ^6.3.2                     # Open external URLs, emails, SMS
  upgrader: ^12.5.0                        # Alert users if update is available
  in_app_update: ^4.2.2                    # Android-specific in-app updates
  package_info_plus: ^9.0.0               # Read app version, build number, etc.
  flutter_native_splash: ^2.4.7            # Native splash screen setup
  device_info_plus: ^12.3.0                # Detailed hardware/software info

  # --- Feature Specific ---
  razorpay_flutter: ^1.4.0                 # Razorpay payment gateway
  country_code_picker: ^3.4.1              # Country selection with flags





dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.12.2
  json_serializable: ^6.13.0
  freezed: ^3.2.5

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/svgs/
    - assets/images/
    - assets/

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  fonts:
    - family: PP Cirka
      fonts:
        - asset: assets/fonts/PPCirka-Bold.otf
          weight: 700
        - asset: assets/fonts/PPCirka-Light.otf
          weight: 300
        - asset: assets/fonts/PPCirka-Variable.ttf
          weight: 400

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpeg"
  min_sdk_android: 21 # android >= 5.0
